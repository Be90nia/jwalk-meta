name: Linux Benchmark

# 用途：对比 jwalk-meta Linux 两条目录枚举路径的性能
#   - default (无 feature)：getdents64 直调 + fstatat + 流式子目录分发
#   - legacy-read-dir feature：std::fs::read_dir fallback（baseline）
#
# 触发：手动 / push 到 master / PR 到 master
# 输出：每个 feature 跑 scan_unix 示例，artifact 上传对比

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'examples/scan_unix.rs'
      - 'Cargo.toml'
      - '.github/workflows/linux-bench.yml'
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  RUSTFLAGS: '-C opt-level=3'

jobs:
  benchmark:
    name: Bench (${{ matrix.feature_label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - feature: ''
            feature_label: 'getdents64'
            features_arg: '--no-default-features'
          - feature: 'legacy-read-dir'
            feature_label: 'fs_read_dir_baseline'
            features_arg: '--features legacy-read-dir'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.feature_label }}

      - name: Build scan_unix (release)
        run: cargo build --release ${{ matrix.features_arg }} --example scan_unix

      - name: Prepare benchmark directory
        run: |
          mkdir -p bench_dir/flat
          mkdir -p bench_dir/nested/level0/{a,b,c,d,e,f,g,h,i,j}

          # 扁平目录：10K 文件
          for i in $(seq 1 10000); do
            touch bench_dir/flat/f_${i}.txt
          done

          # 嵌套目录：10 个 level0 子目录，每个 100 文件 + 10 个子目录各 10 文件
          for d in bench_dir/nested/level0/*; do
            for i in $(seq 1 100); do
              touch "$d/f_${i}.txt"
            done
            mkdir -p "$d/sub"
            for i in $(seq 1 10); do
              touch "$d/sub/s_${i}.txt"
            done
          done

          # 输出测试目录概览
          echo "=== Test directory layout ==="
          find bench_dir -maxdepth 2 -type d | head -20
          echo "..."
          echo "Total entries: $(find bench_dir | wc -l)"

      - name: Warm-up run
        run: |
          cargo run --release ${{ matrix.features_arg }} --example scan_unix -- bench_dir > warmup.log 2>&1 || true
          tail -5 warmup.log

      - name: Benchmark run 1 (flat)
        run: |
          echo "=== Run 1: flat dir (10K files) ==="
          cargo run --release ${{ matrix.features_arg }} --example scan_unix -- bench_dir/flat 2>&1 | tee result_flat.txt

      - name: Benchmark run 2 (nested)
        run: |
          echo "=== Run 2: nested dir (10 dirs × 110 files + subs) ==="
          cargo run --release ${{ matrix.features_arg }} --example scan_unix -- bench_dir/nested 2>&1 | tee result_nested.txt

      - name: Benchmark run 3 (full tree)
        run: |
          echo "=== Run 3: full tree ==="
          cargo run --release ${{ matrix.features_arg }} --example scan_unix -- bench_dir 2>&1 | tee result_full.txt

      - name: Run unit tests
        run: cargo test --lib ${{ matrix.features_arg }}

      - name: Collect results
        run: |
          {
            echo "## Benchmark Results: ${{ matrix.feature_label }}"
            echo ""
            echo "Feature: \`${{ matrix.feature }}\`"
            echo ""
            echo "### Run 1: flat (10K files)"
            echo '```'
            cat result_flat.txt
            echo '```'
            echo ""
            echo "### Run 2: nested"
            echo '```'
            cat result_nested.txt
            echo '```'
            echo ""
            echo "### Run 3: full tree"
            echo '```'
            cat result_full.txt
            echo '```'
          } > summary_${{ matrix.feature_label }}.md

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.feature_label }}
          path: |
            summary_*.md
            result_*.txt
            warmup.log
          retention-days: 30
