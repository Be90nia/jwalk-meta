name: Linux Benchmark

# 用途：对比 jwalk-meta Linux 两条目录枚举路径的性能
#   - default (无 feature)：getdents64 直调 + fstatat + 流式子目录分发
#   - legacy-read-dir feature：std::fs::read_dir fallback（baseline）
#
# 触发：手动 / push 到 master / PR 到 master
# 输出：每个 feature 跑 scan_unix 示例，artifact 上传对比

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'examples/scan_unix.rs'
      - 'Cargo.toml'
      - '.github/workflows/linux-bench.yml'
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  RUSTFLAGS: '-C opt-level=3'

jobs:
  benchmark:
    name: Bench (${{ matrix.feature_label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - feature: ''
            feature_label: 'getdents64'
            features_arg: '--no-default-features'
          - feature: 'legacy-read-dir'
            feature_label: 'fs_read_dir_baseline'
            features_arg: '--features legacy-read-dir'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.feature_label }}

      - name: Build scan_unix (release)
        run: cargo build --release ${{ matrix.features_arg }} --example scan_unix

      - name: Prepare benchmark directory
        run: |
          mkdir -p bench_dir/flat
          mkdir -p bench_dir/nested/level0/{a,b,c,d,e,f,g,h,i,j}

          # 扁平目录：10K 文件
          for i in $(seq 1 10000); do
            touch bench_dir/flat/f_${i}.txt
          done

          # 嵌套目录：10 个 level0 子目录，每个 100 文件 + 10 个子目录各 10 文件
          for d in bench_dir/nested/level0/*; do
            for i in $(seq 1 100); do
              touch "$d/f_${i}.txt"
            done
            mkdir -p "$d/sub"
            for i in $(seq 1 10); do
              touch "$d/sub/s_${i}.txt"
            done
          done

          # 输出测试目录概览
          echo "=== Test directory layout ==="
          find bench_dir -maxdepth 2 -type d | head -20
          echo "..."
          echo "Total entries: $(find bench_dir | wc -l)"

      - name: Warm-up run
        run: |
          cargo run --release ${{ matrix.features_arg }} --example scan_unix -- bench_dir > warmup.log 2>&1 || true
          tail -5 warmup.log

      - name: Benchmark run 1 (flat)
        run: |
          echo "=== Run 1: flat dir (10K files) ==="
          cargo run --release ${{ matrix.features_arg }} --example scan_unix -- bench_dir/flat 2>&1 | tee result_flat.txt

      - name: Benchmark run 2 (nested)
        run: |
          echo "=== Run 2: nested dir (10 dirs × 110 files + subs) ==="
          cargo run --release ${{ matrix.features_arg }} --example scan_unix -- bench_dir/nested 2>&1 | tee result_nested.txt

      - name: Benchmark run 3 (full tree)
        run: |
          echo "=== Run 3: full tree ==="
          cargo run --release ${{ matrix.features_arg }} --example scan_unix -- bench_dir 2>&1 | tee result_full.txt

      - name: Run unit tests
        run: cargo test --lib ${{ matrix.features_arg }}

      - name: Collect results
        run: |
          {
            echo "## Benchmark Results: ${{ matrix.feature_label }}"
            echo ""
            echo "Feature: \`${{ matrix.feature }}\`"
            echo ""
            echo "### Run 1: flat (10K files)"
            echo '```'
            cat result_flat.txt
            echo '```'
            echo ""
            echo "### Run 2: nested"
            echo '```'
            cat result_nested.txt
            echo '```'
            echo ""
            echo "### Run 3: full tree"
            echo '```'
            cat result_full.txt
            echo '```'
          } > summary_${{ matrix.feature_label }}.md

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.feature_label }}
          path: |
            summary_*.md
            result_*.txt
            warmup.log
          retention-days: 30

  # ── SMB loopback benchmark ──────────────────────────────────────────
  # 在 CI 里起 smbd + cifs mount，验证 io_uring 批量 STATX 在网络挂载点的效果
  smb-benchmark:
    name: SMB Bench (io_uring vs fstatat)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: smb-bench

      - name: Build scan_unix (release, default features)
        run: cargo build --release --no-default-features --example scan_unix

      - name: Setup Samba + cifs mount
        run: |
          set -euo pipefail

          # 安装 samba + cifs-utils
          sudo apt-get update -qq
          sudo apt-get install -y -qq samba cifs-utils

          # 创建共享目录 + 测试目录树
          sudo mkdir -p /srv/smbshare
          sudo mkdir -p /srv/smbshare/flat
          sudo bash -c 'mkdir -p /srv/smbshare/nested/level0/{a,b,c,d,e}'

          # 扁平目录：2K 文件（SMB 较慢，不需要 10K）
          for i in $(seq 1 2000); do
            sudo touch /srv/smbshare/flat/f_${i}.txt
          done

          # 嵌套目录：5 个子目录各 50 文件
          for d in /srv/smbshare/nested/level0/*; do
            for i in $(seq 1 50); do
              sudo touch "$d/f_${i}.txt"
            done
          done

          echo '=== SMB share directory layout ==='
          find /srv/smbshare -maxdepth 2 -type d | head -20
          echo "Total entries: $(find /srv/smbshare | wc -l)"

          # 确保 guest (nobody) 可读
          sudo chmod -R 755 /srv/smbshare
          # 配置 smbd（不用 heredoc，避免 YAML 缩进问题）
          sudo bash -c 'cat > /etc/samba/smb.conf <<INNER_EOF
          [global]
             workgroup = WORKGROUP
             server string = CI Samba
             security = user
             map to guest = Bad User
             dns proxy = no
             log level = 1

          [share]
             path = /srv/smbshare
             browsable = yes
             read only = no
             guest ok = yes
             create mask = 0644
             directory mask = 0755
          INNER_EOF'

          # 启动 smbd
          sudo smbd
          sleep 2

          # 验证 smbd 在跑
          pgrep smbd || { echo 'ERROR: smbd not running'; exit 1; }

          # cifs 挂载（guest 模式，vers=3.0）
          sudo mkdir -p /mnt/smb_test
          sudo mount -t cifs //localhost/share /mnt/smb_test -o guest,vers=3.0,cache=none

          # 验证挂载
          mount | grep cifs
          ls /mnt/smb_test/ | head -5

      - name: Verify fs_detect picks up SMB
        run: |
          echo "=== statfs on SMB mount ==="
          # df -T 应显示 cifs
          df -T /mnt/smb_test
          # stat 应该能工作
          stat /mnt/smb_test/flat/f_1.txt || echo 'stat failed (may be expected with guest)'

      - name: SMB Benchmark (io_uring path - default features)
        run: |
          echo '=== SMB Bench: io_uring path (default features) ==='
          cargo run --release --no-default-features --example scan_unix -- /mnt/smb_test 2>&1 | tee result_smb_iouring.txt

      - name: SMB Benchmark (fstatat path - with legacy-read-dir)
        run: |
          echo '=== SMB Bench: fstatat path (legacy-read-dir) ==='
          cargo build --release --features legacy-read-dir --example scan_unix
          cargo run --release --features legacy-read-dir --example scan_unix -- /mnt/smb_test 2>&1 | tee result_smb_fstatat.txt

      - name: SMB Benchmark (flat dir - io_uring)
        run: |
          echo '=== SMB Bench: flat dir (2K files) - io_uring ==='
          cargo run --release --no-default-features --example scan_unix -- /mnt/smb_test/flat 2>&1 | tee result_smb_flat_iouring.txt

      - name: SMB Benchmark (flat dir - fstatat)
        run: |
          echo '=== SMB Bench: flat dir (2K files) - fstatat ==='
          cargo run --release --features legacy-read-dir --example scan_unix -- /mnt/smb_test/flat 2>&1 | tee result_smb_flat_fstatat.txt

      - name: Collect SMB results
        if: always()
        run: |
          {
            echo '## SMB Benchmark Results'
            echo ''
            echo '### Full tree - io_uring (default features)'
            echo '```'
            cat result_smb_iouring.txt
            echo '```'
            echo ''
            echo '### Full tree - fstatat (legacy-read-dir)'
            echo '```'
            cat result_smb_fstatat.txt
            echo '```'
            echo ''
            echo '### Flat dir - io_uring'
            echo '```'
            cat result_smb_flat_iouring.txt
            echo '```'
            echo ''
            echo '### Flat dir - fstatat'
            echo '```'
            cat result_smb_flat_fstatat.txt
            echo '```'
          } > summary_smb.md

      - name: Unmount SMB
        if: always()
        run: |
          sudo umount /mnt/smb_test 2>/dev/null || true
          sudo pkill smbd 2>/dev/null || true

      - name: Upload SMB benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-smb
          path: |
            summary_smb.md
            result_smb_*.txt
          retention-days: 30
